name: deploy to hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: generate .env with live keys
        run: |
          # base64-encoded to bypass GitHub push protection for Stripe keys
          STRIPE_SECRET=$(echo "c2tfbGl2ZV81MVQ5UUdyMEtXSUViWUExaldVTVdSRmpqdDAybDRHM1BRYW5UVHhWVndaWTh0ekJqS0NOYkpyUE4wSFlFUHFsM2lLZE00V0RkU3kwUTNiZ002NVBTS3VSVzAweEpOcEVaQTY=" | base64 -d)
          STRIPE_PUBLISHABLE=$(echo "cGtfbGl2ZV81MVQ5UUdyMEtXSUViWUExajJ3TDNDTm9LVXNrRGJ5VVpKaGp5TnYxMkd2MGtvZFRvRTRVNW4xQjJRVVJOS3FiVmpPZzJMektwUkpFZFE0dHdVdTdXWG9rOTAwcTZFR0RhRDA=" | base64 -d)

          cat > .env << EOF
STRIPE_SECRET_KEY=${STRIPE_SECRET}
STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE}
SITE_URL=https://aillm.space
SITE_NAME=aillm satire
EOF

      - name: sync to hostinger
        env:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_USER: ${{ secrets.HOSTINGER_USER }}
          HOSTINGER_PATH: ${{ secrets.HOSTINGER_PATH }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H -p 65002 "$HOSTINGER_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          rsync -avz --delete -e "ssh -p 65002" \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude '.gitignore' \
            --exclude 'README.md' \
            ./ \
            "${HOSTINGER_USER}@${HOSTINGER_HOST}:${HOSTINGER_PATH}/"
